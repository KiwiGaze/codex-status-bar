name: CI
on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
      - name: Build (ad-hoc, no notarization)
        run: SKIP_NOTARIZE=1 ./build.sh
      - name: Swift logic tests
        run: |
          swiftc Tests/logic_tests.swift Sources/SessionState.swift Sources/AppSupport.swift -o "$RUNNER_TEMP/csbt"
          "$RUNNER_TEMP/csbt"
      - name: Node tests
        run: |
          node --test Tests/install.test.mjs
          node --test Tests/update.test.mjs
      - name: JS syntax check
        run: node --check hooks/install.js && node --check hooks/lifecycle.js && node --check hooks/uninstall.js && node --check hooks/update.js
